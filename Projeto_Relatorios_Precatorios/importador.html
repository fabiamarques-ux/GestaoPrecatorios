<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Importador de Planilha - TRT19</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>

<body class="bg-light p-5">
    <div class="container bg-white p-4 shadow rounded">
        <h4>1. Selecione a Planilha (.xlsx ou .csv)</h4>
        <input type="file" id="inputExcel" class="form-control mb-4" accept=".xlsx, .xls, .csv">

        <h4>2. Código Gerado para o dados.js</h4>
        <p class="small text-muted">Copie o conteúdo abaixo e substitua no seu arquivo dados.js</p>
        <textarea id="resultado" class="form-control" rows="15" readonly
            style="font-family: monospace; font-size: 12px;"></textarea>
        <button id="btnCopiar" class="btn btn-primary mt-3">Copiar Código</button>
    </div>

    <script>
        document.getElementById('inputExcel').addEventListener('change', function (e) {
            const file = e.target.files[0];
            const reader = new FileReader();

            reader.onload = function (e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array', cellDates: true });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];

                // 1. Encontrar a linha do cabeçalho (procura por colunas chave nas primeiras 20 linhas)
                const rawData = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
                let headerIndex = 0;
                for (let i = 0; i < Math.min(rawData.length, 20); i++) {
                    const rowStr = JSON.stringify(rawData[i]).toUpperCase();
                    if (rowStr.includes("RP") || rowStr.includes("BENEFICIÁRIO") || rowStr.includes("CPF/CNPJ")) {
                        headerIndex = i;
                        break;
                    }
                }

                // 2. Converte a planilha em JSON começando da linha do cabeçalho encontrada
                const rows = XLSX.utils.sheet_to_json(firstSheet, { range: headerIndex });

                // 3. Função auxiliar para buscar valores com flexibilidade de nomes de colunas
                const getVal = (row, ...possibles) => {
                    const keys = Object.keys(row);
                    for (let p of possibles) {
                        const foundKey = keys.find(k => k.trim().toUpperCase() === p.toUpperCase());
                        if (foundKey) return row[foundKey];
                    }
                    return "";
                };

                // 4. Função para formatar valores monetários
                const parseMoney = (val) => {
                    if (!val) return "0,00";
                    if (typeof val === 'number') return val.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
                    let v = val.toString();
                    // Remove pontos de milhar e troca vírgula decimal por ponto
                    if (v.includes(',') && v.includes('.')) v = v.replace(/\./g, '').replace(',', '.');
                    else if (v.includes(',')) v = v.replace(',', '.');
                    const floatVal = parseFloat(v);
                    return isNaN(floatVal) ? "0,00" : floatVal.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
                };

                // 5. Função para formatar datas
                const formatDate = (val) => {
                    if (!val) return "";
                    if (val instanceof Date) {
                        return val.toLocaleDateString('pt-BR');
                    }
                    // Fallback para números inteiros (datas seriais do Excel)
                    if (typeof val === 'number' && val > 20000) {
                        // Tenta converter usando a biblioteca interna do XLSX
                        const date = XLSX.SSF.parse_date_code(val);
                        if (date) return `${String(date.d).padStart(2, '0')}/${String(date.m).padStart(2, '0')}/${date.y}`;
                    }
                    return val;
                };

                // Mapeia os nomes das colunas da planilha para os nomes do seu código
                const dbFormatado = rows.map(r => ({
                    esfera: getVal(r, "Esfera") || "Municipal",
                    ente: (getVal(r, "Ente Devedor", "Ente") || "").toUpperCase(),
                    rp: getVal(r, "Nº da RP", "RP", "Nº RP"),
                    processo: getVal(r, "Nº Processo", "Processo"),
                    precatorio: getVal(r, "Nº Precatório", "Precatório", "Precatorio"),
                    preferencia: getVal(r, "Preferência", "Preferência"),
                    ordem_pagamento: getVal(r, "Ordem de Pagamento", "Ordem"),
                    beneficiarios: getVal(r, "Beneficiários", "Beneficiario", "Nome"),
                    cpf_cnpj: getVal(r, "CPF/CNPJ", "CPF", "CNPJ"),
                    ano: getVal(r, "Vencimento", "Ano"),
                    apresentacao: formatDate(getVal(r, "Apresentação", "Data Apresentação")),
                    requisicao: formatDate(getVal(r, "Requisição", "Data Requisição")),
                    prazo_pagamento: formatDate(getVal(r, "Prazo", "Prazo Pagamento", "Prazo para Pagamento")),
                    data_deposito: formatDate(getVal(r, "Data Depósito", "Depósito Ente", "Data do Depósito Bancário do Ente")),
                    ultima_atualizacao: formatDate(getVal(r, "Última atualização", "Atualização")),
                    liquido_ir: parseMoney(getVal(r, "Líquido Exequente + IR", "Valor Líquido")),
                    fgts: parseMoney(getVal(r, "FGTS")),
                    inss_beneficiario: parseMoney(getVal(r, "INSS Beneficiário")),
                    inss_executado: parseMoney(getVal(r, "INSS Executado + Custas", "INSS Executado")),
                    valor: parseMoney(getVal(r, "Total Devido", "Valor Total", "Valor")),
                    situacao: getVal(r, "Situação da RP", "Situação")
                }));

                // Gera o texto final para o arquivo dados.js
                const jsonFormatado = "[\n" + dbFormatado.map(item => "    " + JSON.stringify(item)).join(",\n") + "\n]";
                const output = `const dbProcessosBase = ${jsonFormatado};\n\nconst entesRegimeEspecial = ["CANAPI", "ANADIA", "MACEIO", "UNIÃO DOS PALMARES", "DELMIRO GOUVEIA"];`;

                document.getElementById('resultado').value = output;
            };

            reader.readAsArrayBuffer(file);
        });

        document.getElementById('btnCopiar').addEventListener('click', function () {
            const texto = document.getElementById('resultado');
            texto.select();
            document.execCommand('copy');
            alert('Código copiado com sucesso!');
        });
    </script>
</body>

</html>
